services:
  - type: web
    name: pharma-route-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # preencher manualmente no dashboard do Render com a URL do Supabase
      - key: CORS_ORIGINS
        sync: false   # ex: https://pharma-route.vercel.app
